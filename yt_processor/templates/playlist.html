<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>YT Processor - {{ title }}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0da6f2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
    <!-- Header -->
    <header class="flex items-center justify-between whitespace-nowrap border-b border-gray-200/10 dark:border-white/10 px-6 md:px-10 py-3 sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-sm">
        <div class="flex items-center gap-4 text-black dark:text-white">
            <div class="size-6 text-primary">
                <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill="currentColor" fill-rule="evenodd"></path>
                </svg>
            </div>
            <a href="/" class="text-black dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] hover:opacity-80">YT Processor</a>
        </div>
        <div class="flex flex-1 justify-end items-center gap-4">
             <a href="/" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-slate-200 dark:bg-[#283339] text-slate-900 dark:text-white text-sm font-bold leading-normal tracking-[0.015em]">
                <span class="material-symbols-outlined text-base mr-2">add</span> New Link
            </a>
        </div>
    </header>

    <main class="flex-1 px-4 sm:px-6 lg:px-10 py-8">
        <div class="mx-auto max-w-7xl">
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left Column: Summary Card -->
                <aside class="w-full lg:w-1/3 lg:max-w-sm flex-shrink-0">
                    <div class="bg-white dark:bg-[#1A2831] rounded-xl border border-gray-200 dark:border-gray-800 p-6 flex flex-col gap-4 sticky top-24">
                        {% if thumbnail %}
                        <div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg" style='background-image: url("{{ thumbnail }}");'></div>
                        {% endif %}
                        <div class="flex flex-col gap-2">
                            <p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">Channel / Playlist</p>
                            <h3 class="text-black dark:text-white text-xl font-bold leading-tight">{{ title }}</h3>
                            <p class="text-gray-600 dark:text-gray-400 text-base font-normal leading-normal">{{ uploader }}</p>
                        </div>
                        <div class="border-t border-gray-200 dark:border-gray-700/50 pt-4">
                            <p class="text-gray-600 dark:text-gray-300 text-base font-medium leading-normal">Showing {{ videos|length }} videos</p>
                        </div>
                    </div>
                </aside>

                <!-- Right Column: Main Content -->
                <div class="flex-1">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <h2 class="text-black dark:text-white text-2xl font-bold leading-tight tracking-[-0.015em]">Videos</h2>
                        <div class="flex flex-1 sm:flex-initial gap-3 flex-wrap justify-start sm:justify-end">
                            <button onclick="downloadAllTranscripts()" class="flex min-w-[84px] w-full sm:w-auto max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] gap-2 hover:bg-primary/90 transition-colors">
                                <span class="material-symbols-outlined text-xl">download</span>
                                <span class="truncate">Download All Transcripts</span>
                            </button>
                            <button onclick="copyAllLinks()" class="flex min-w-[84px] w-full sm:w-auto max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-gray-200 dark:bg-gray-700 text-black dark:text-white text-base font-bold leading-normal tracking-[0.015em] gap-2 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                                <span class="material-symbols-outlined text-xl">content_copy</span>
                                <span class="truncate">Copy All Video Links</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-3" id="video-list">
                        {% for video in videos %}
                        <div class="flex items-center gap-4 rounded-lg bg-white dark:bg-[#1A2831] p-3 border border-gray-200 dark:border-gray-800 hover:border-primary/50 dark:hover:border-primary/50 transition-colors">
                            <!-- We might not have thumbnails for every video in a flat playlist scan unless we fetch them, assume title/id -->
                            <div class="flex-1 min-w-0">
                                <p class="text-black dark:text-white text-base font-medium leading-tight truncate">{{ video.title }}</p>
                                <p class="text-gray-500 text-sm truncate">{{ video.id }}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <a href="/video/{{ video.id }}" class="flex size-9 cursor-pointer items-center justify-center overflow-hidden rounded-full text-gray-500 dark:text-gray-400 hover:bg-primary/10 hover:text-primary dark:hover:bg-primary/20 transition-colors" title="Process Video">
                                    <span class="material-symbols-outlined text-xl">settings</span>
                                </a>
                                <a href="https://youtube.com/watch?v={{ video.id }}" target="_blank" class="flex size-9 cursor-pointer items-center justify-center overflow-hidden rounded-full text-gray-500 dark:text-gray-400 hover:bg-primary/10 hover:text-primary dark:hover:bg-primary/20 transition-colors" title="Open on YouTube">
                                    <span class="material-symbols-outlined text-xl">open_in_new</span>
                                </a>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</div>
<script>
    const playlistId = "{{ playlist_id }}";
    const videoIds = [{% for v in videos %}"{{ v.id }}",{% endfor %}];

    function downloadAllTranscripts() {
        if(!confirm(`Download transcripts for ${videoIds.length} videos? This might take a moment.`)) return;
        // Trigger batch download
        window.location.href = `/api/batch/transcript?playlist_id=${playlistId}`;
    }

    function copyAllLinks() {
        const links = videoIds.map(id => `https://www.youtube.com/watch?v=${id}`).join('\n');
        navigator.clipboard.writeText(links).then(() => {
            alert('All links copied to clipboard!');
        });
    }
</script>
</body>
</html>
