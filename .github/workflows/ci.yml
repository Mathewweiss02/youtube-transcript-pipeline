name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s yt_processor/tests -v

      - name: Run doctor smoke check
        run: yt-pipeline-doctor --create-dirs --verify-examples

      - name: Check CLI help
        run: |
          yt-pipeline-download --help
          yt-pipeline-chunk --help
          yt-pipeline-scan --help
          yt-pipeline-update --help
          yt-pipeline-audit --help

      - name: Build package artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -m pip install build
          python -m build
